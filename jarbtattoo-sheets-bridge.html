<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarbtattoo · เชื่อม Google Sheets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.JARBTATTOO_SHEETS_URL =
        window.JARBTATTOO_SHEETS_URL ||
        "https://script.google.com/macros/s/AKfycbzi5BMtlvv75d_DhBc3mTv0xdtgKOrzSn3bXS67O5KweWoSaMNlZsmtV_hvXNMF-lvUKw/exec";
    </script>
  </head>
  <body class="min-h-screen bg-neutral-50 p-6 text-neutral-900">
    <div class="mx-auto max-w-3xl space-y-6">
      <header>
        <h1 class="text-xl font-semibold">เชื่อมต่อ Google Apps Script → Sheets</h1>
        <p class="mt-2 text-sm text-neutral-600">
          วาง Web App URL แล้วทดสอบ <code class="rounded bg-neutral-200 px-1">loadAll</code> /
          <code class="rounded bg-neutral-200 px-1">pushAllFromLocal</code> โมดูลอยู่ที่
          <code class="rounded bg-neutral-200 px-1">jarbtattoo-sheets-storage.js</code>
        </p>
      </header>

      <section class="rounded-2xl border border-neutral-200 bg-white p-5 shadow-sm">
        <label for="gas-url" class="mb-2 block text-sm font-medium">Web App URL</label>
        <input
          id="gas-url"
          type="url"
          class="w-full rounded-lg border border-neutral-300 px-3 py-2 text-sm"
          placeholder="https://script.google.com/macros/s/AKfycbzi5BMtlvv75d_DhBc3mTv0xdtgKOrzSn3bXS67O5KweWoSaMNlZsmtV_hvXNMF-lvUKw/exec"
        />
        <div class="mt-4 flex flex-wrap gap-2">
          <button
            type="button"
            id="btn-pull"
            class="rounded-lg bg-neutral-900 px-4 py-2 text-sm font-medium text-white hover:bg-neutral-800"
          >
            ดึงจาก Sheets → เขียน localStorage
          </button>
          <button
            type="button"
            id="btn-push"
            class="rounded-lg border border-neutral-300 bg-white px-4 py-2 text-sm font-medium hover:bg-neutral-50"
          >
            อ่าน localStorage → ส่งขึ้น Sheets
          </button>
        </div>
        <p id="status" class="mt-3 text-sm text-neutral-600"></p>
      </section>

      <section class="rounded-2xl border border-neutral-200 bg-white p-5 shadow-sm">
        <h2 class="text-sm font-semibold text-neutral-800">ผลลัพธ์ (ย่อ)</h2>
        <pre id="out" class="mt-2 max-h-96 overflow-auto rounded-lg bg-neutral-900 p-3 text-xs text-neutral-100"></pre>
      </section>
    </div>

    <script src="jarbtattoo-sheets-storage.js"></script>
    <script>
      (function () {
        var statusEl = document.getElementById("status");
        var outEl = document.getElementById("out");
        var urlInput = document.getElementById("gas-url");

        function setStatus(msg, isErr) {
          statusEl.textContent = msg;
          statusEl.className = "mt-3 text-sm " + (isErr ? "text-red-700" : "text-emerald-800");
        }

        function previewStores(stores) {
          if (!stores) return "{}";
          var keys = Object.keys(stores);
          var summary = {};
          keys.forEach(function (k) {
            var v = stores[k];
            if (Array.isArray(v)) summary[k] = "array[" + v.length + "]";
            else summary[k] = typeof v;
          });
          return JSON.stringify(summary, null, 2);
        }

        document.getElementById("btn-pull").addEventListener("click", function () {
          JarbtattooSheetsStorage.configure({ baseUrl: urlInput.value.trim() });
          setStatus("กำลังโหลด…");
          outEl.textContent = "";
          JarbtattooSheetsStorage.pullAllToLocal()
            .then(function (stores) {
              setStatus("ดึงสำเร็จ — ข้อมูลถูกเขียนลง localStorage แล้ว (เปิด admin / schedule / content ในหน้าต่างเดียวกันเพื่อใช้ข้อมูลนี้)");
              outEl.textContent = previewStores(stores);
            })
            .catch(function (e) {
              setStatus(String(e.message || e), true);
              outEl.textContent = String(e && e.stack ? e.stack : e);
            });
        });

        document.getElementById("btn-push").addEventListener("click", function () {
          JarbtattooSheetsStorage.configure({ baseUrl: urlInput.value.trim() });
          setStatus("กำลังอัปโหลด…");
          outEl.textContent = "";
          JarbtattooSheetsStorage.pushAllFromLocal()
            .then(function () {
              setStatus("ส่งขึ้น Sheets ครบทุกคีย์แล้ว");
              outEl.textContent = "ok";
            })
            .catch(function (e) {
              setStatus(String(e.message || e), true);
              outEl.textContent = String(e && e.stack ? e.stack : e);
            });
        });

        if (window.JARBTATTOO_SHEETS_URL) urlInput.value = window.JARBTATTOO_SHEETS_URL;
      })();
    </script>
  </body>
</html>
